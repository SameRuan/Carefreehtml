<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Document</title>
		<style>
			body {
				background-image: url(dengl.jpg);
				background-size: 100% 130%;
			}
			#login_box {
				width: 20%;
				height: 200px;
				background-color: #c5c5c560;
				margin: auto;
				margin-top: 15%;
				text-align: center;
				border-radius: 10px;
				padding: 50px 50px;
			}
			h2 {
				color: #00000090;
				margin-top: 5%;
			}
			#input-box {
				background-color: white;
				color: #ffffff;
				margin-top: 5%;
			}
			span {
				color: #fff;
			}
			input {
				border: 0;
				width: 60%;
				font-size: 15px;
				color: #fff;
				background: transparent;
				border-bottom: 2px solid #fff;
				padding: 5px 10px;
				outline: none;
				margin-top: 10px;
			}
			button {
				margin-top: 50px;
				width: 60%;
				height: 30px;
				border-radius: 10px;
				border: 0;
				color: #fff;
				text-align: center;
				line-height: 30px;
				font-size: 15px;
				background-image: linear-gradient(to right, #30cfd0, #330867);
			}
			#sign_up {
				margin-top: 45%;
				margin-left: 60%;
			}
			a {
				color: #b94648;
				text-decoration: none;
			}
		</style>
	</head>
	<body>
		<div id="login_box">
			<h2>LOGIN</h2>
			<div id="input_box">

			</div>
			<div class="input_box">

			</div>
			<button>

</html>
