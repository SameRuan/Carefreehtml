<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>留言板</title>
    <link href="https://cdn.bootcss.com/twitter-bootstrap/4.4.1/css/bootstrap.min.css" rel="stylesheet">
    <style type="text/css">
        *{
            padding: 0;
            margin: 0;
			
        }
		
        .header{
            padding: 30px 10px 70px 20px;
            border-bottom:  1px solid rgba(0,0,0,.1);
			/*background: url(banner/7.png) no-repeat;*/
			background-size: 1200px 800px;
        }
        .content-form{
            margin-top: 20px;
            padding: 5px;
        }
        .content-form form{
            background: #F8F8F8;
            padding: 10px;
            border-radius: 3px;
        }
        .content-form-title{
            padding: 10px 5px;
            border-bottom: 1px solid #eee;
        }
		a{
			color:grey;
			display: block;
		}
		a:hover{
			display: block;
			color:white;
			text-decoration: none;
		}
    </style>
</head>
<body>
<div class="col-md-10 offset-md-1">
    <div class="header">
        <div class="content-form">
            <form action="" class="offset-md-2 col-md-8 ">
                <h4 class="content-form-title">留言板</h4>
                <div class="form-group mx-sm-3 mb-2 mt-4">
                    <label for="title">主题</label>
                    <input type="text" class="form-control" id="title"  placeholder="留言主题">
                </div>
                <div class="form-group mx-sm-3 mb-2">
                    <label for="value">内容</label>
                    <textarea class="form-control" id="value" rows="3" placeholder="留言内容"></textarea>
                </div>
                <div class="form-group mx-sm-3 mb-2">
                    <label for="name">姓名</label>
                    <input type="text" class="form-control" id="name"  placeholder="请输入姓名">
                </div>
                <div class="form-group mx-sm-3 mb-2">
                    <label for="title">邮箱</label>
                    <input type="email" class="form-control" id="email"  placeholder="请输入邮箱">
                </div>
                <div class="form-group mx-sm-3 mb-2 mt-4">
                    <button type="submit" class="btn btn-primary">提交</button>
					<button type="reset" class="btn btn-outline-secondary">重置</button>
                    <button type="onsubmit" class="btn btn-outline-secondary"><a title="取消提交" href="chinese   food.html" target="_blank">取消提交</a></button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
